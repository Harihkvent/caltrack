name: keep-warm

on:
  schedule:
    - cron: "*/10 2-18 * * *"
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -fsS "${{ secrets.BACKEND_HEALTH_URL }}"
      - name: Ping supabase rest
        run: |
          curl -fsS "${{ secrets.SUPABASE_URL }}/rest/v1/"
