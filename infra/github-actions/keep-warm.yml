name: keep-warm

on:
  schedule:
    - cron: "*/10 2-18 * * *"
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -fsS "${{ secrets.BACKEND_HEALTH_URL }}"
      - name: Ping supabase rest
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SUPABASE_URL }}/rest/v1/")
          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 401 ]; then
            echo "Error: Supabase returned HTTP status $STATUS"
            exit 1
          fi
