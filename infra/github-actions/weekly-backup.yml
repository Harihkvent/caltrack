name: weekly-db-backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Validate and Prepare Database URL
        env:
          RAW_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$RAW_DATABASE_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is missing in GitHub Secrets!"
            echo "=========================================================================="
            echo "How to fix this error:"
            echo "1. Go to your GitHub repository: Settings -> Secrets and variables -> Actions"
            echo "2. Click 'New repository secret'"
            echo "3. Set Name to: SUPABASE_DB_URL"
            echo "4. Set Value to your Supabase Connection String."
            echo "=========================================================================="
            exit 1
          fi

          CONVERTED_URL=$(python3 -c '
          import os, urllib.parse, sys
          url = os.environ.get("RAW_DATABASE_URL", "")
          try:
              parsed = urllib.parse.urlparse(url)
              if parsed.hostname and "pooler.supabase.com" in parsed.hostname:
                  username = parsed.username or ""
                  if "." in username:
                      base_user, project_ref = username.split(".", 1)
                      new_host = f"db.{project_ref}.supabase.co"
                      new_port = 5432
                      netloc = f"{base_user}"
                      if parsed.password:
                          netloc += f":{parsed.password}"
                      netloc += f"@{new_host}:{new_port}"
                      parsed = parsed._replace(netloc=netloc)
                      print(urllib.parse.urlunparse(parsed))
                      sys.exit(0)
          except Exception:
              pass
          print(url)
          ')

          echo "DATABASE_URL=$CONVERTED_URL" >> $GITHUB_ENV
      - name: Create backup
        run: |
          mkdir -p backups
          pg_dump "$DATABASE_URL" --format=custom --no-owner --no-acl > "backups/caltrack-$(date +%F).dump"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-db-dump
          path: backups/*.dump
