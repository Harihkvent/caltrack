name: weekly-db-backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install postgres client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
      - name: Validate and Prepare Database URLs
        env:
          RAW_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$RAW_DATABASE_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is missing in GitHub Secrets!"
            echo "=========================================================================="
            echo "How to fix this error:"
            echo "1. Go to your GitHub repository: Settings -> Secrets and variables -> Actions"
            echo "2. Click 'New repository secret'"
            echo "3. Set Name to: SUPABASE_DB_URL"
            echo "4. Set Value to your Supabase Connection String."
            echo "=========================================================================="
            exit 1
          fi

          DIRECT_DATABASE_URL=$(python3 -c '
          import os, urllib.parse, sys
          url = os.environ.get("RAW_DATABASE_URL", "")
          try:
              parsed = urllib.parse.urlparse(url)
              if parsed.hostname and "pooler.supabase.com" in parsed.hostname:
                  username = parsed.username or ""
                  if "." in username:
                      base_user, project_ref = username.split(".", 1)
                      new_host = f"db.{project_ref}.supabase.co"
                      new_port = 5432
                      netloc = f"{base_user}"
                      if parsed.password:
                          netloc += f":{parsed.password}"
                      netloc += f"@{new_host}:{new_port}"
                      parsed = parsed._replace(netloc=netloc)
                      print(urllib.parse.urlunparse(parsed))
                      sys.exit(0)
          except Exception:
              pass
          print("")
          ')

          echo "RAW_DATABASE_URL=$RAW_DATABASE_URL" >> $GITHUB_ENV
          echo "DIRECT_DATABASE_URL=$DIRECT_DATABASE_URL" >> $GITHUB_ENV
      - name: Create backup
        run: |
          mkdir -p backups
          BACKUP_PATH="backups/caltrack-$(date +%F).dump"

          if [ -n "$DIRECT_DATABASE_URL" ]; then
            echo "Attempting direct Supabase database connection for backup..."
            if pg_dump "$DIRECT_DATABASE_URL" --format=custom --no-owner --no-acl > "$BACKUP_PATH"; then
              exit 0
            fi
            echo "Direct connection failed. Retrying with original SUPABASE_DB_URL..."
          fi

          pg_dump "$RAW_DATABASE_URL" --format=custom --no-owner --no-acl > "$BACKUP_PATH"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-db-dump
          path: backups/*.dump
